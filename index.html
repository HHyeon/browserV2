<html>
<head>
    <meta charset="utf-8">
    <title id="title">BrowserV2</title>

    <style>

        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background-color: rgb(25, 25, 25);
            color: aliceblue;
            margin: 0px;
        }

        .layer-text {
            width: 100%;
            position: absolute;
            z-index: 1;
            bottom: 0;
            padding: 0 36px 36px;
        }
            
        .layer-text h3 {
            text-align: center;
            font-size: 24px;
            background-color: rgba(0, 0, 0, 0.3);
            word-wrap: break-word;
            word-break: break-all;
        }

        .item a {
            padding: 3;
            z-index: 1;
            position: absolute;
            width: 100%;
            margin: 0;
            height: 100%;
        }

        .item {
            border: 2px solid lightgray; /* 기본 상태 */
        }
                
        .item:hover {
            border: 2px solid #007bff; /* hover 시 테두리 강조 */
        }

        .badge-container {
        position: absolute;     /* ⭐ 위치는 컨테이너가 담당 */
        top: 8px;
        right: 8px;

        display: flex;
        flex-direction: column;
        gap: 6px;               /* 세로 간격 */
        z-index: 2;
        }

        .badge {
        position: relative;     /* 링크 덮기용 */
        display: inline-flex;
        align-items: center;

        background-color: rgba(0, 155, 255, 0.5);
        color: black;
        padding: 8px 16px;
        font-size: 22px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        }

        .item-badge-link {
        position: absolute;
        inset: 0;               /* badge 전체 클릭 */
        z-index: 3;
        text-decoration: none;
        color: inherit;
        }

        .rating-container {
        position: absolute;
        top: 8px;
        left: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        z-index: 2;
        }

        .rating-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-color: rgba(255, 155, 0, 0.6);
        color: white;
        width: 24px;
        height: 20px;
        font-size: 12px;
        font-weight: bold;
        border-radius: 3px;
        cursor: pointer;
        text-shadow: 1px 1px 1px black;
        }

        .rating-btn:hover {
        background-color: rgba(255, 155, 0, 0.9);
        }

        .rating-value {
        font-size: 12px;
        color: white;
        text-shadow: 1px 1px 2px black;
        font-weight: bold;
        }


        #scroll-views {
        width: 99%;
        overflow-y: auto;
        }

        .layout {
        height: 100vh;
        }

        .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;

        width: 5%;
        background: rgba(0, 155, 255, 0.3);
        color: white;
        padding: 20px;
                
        transform: translateX(-100%);     /* 기본 숨김 */
        transition: transform 0.25s ease;
        z-index: 1000;
        
        display: flex;
        align-items: center;             /* 세로 중앙 */
        justify-content: center;         /* 가로 중앙 */
        
        }
        
        .sidebar-buttons {
        display: flex;
        flex-direction: column;
        gap: 16px;                       /* 버튼 간격 */
        }

        .sidebar-buttons button {
        width: 50pt;
        height: 50pt;

        border: none;
        border-radius: 12px;
        background: #334155;
        color: white;
        font-size: 24pt;
        cursor: pointer;
 
        align-items: center;             /* 세로 중앙 */
        justify-content: center;         /* 가로 중앙 */

        transition: background 0.2s, transform 0.15s;
        }

        .sidebar-buttons button:hover {
        background: rgba(0, 155, 255, 0.5);
        transform: scale(1.08);
        }

        .sidebar-trigger {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;

        width: 5%;
        padding: 20px;
        z-index: 999;
        }

        .sidebar-trigger:hover + .sidebar,
        .sidebar:hover {
        transform: translateX(0);
        }

    </style>

</head>
<body oncontextmenu="return false">
    
    <div id="search_panel" style="z-index: 1; visibility: hidden; position: fixed; background-color: rgba(0, 0, 0, 0.3); left: 0; top: 10%; width: 100%; height: 5%;" >
        <h1 id="typing_panel" style="text-align: center"></h1>
    </div>

    <canvas hidden></canvas>
    
    <h1 id="MainTitle" style="position: absolute; transform: translate(100px,100px); display: none;">HelloThere</h1>

    <div class="layout">

        <div class="sidebar-trigger"></div>

        <aside class="sidebar">
            
        <div class="sidebar-buttons">
            <button id="btn-open-explorer">📁</button>
            <button onclick="setordertype(1)">🕒</button>
            <button onclick="setordertype(2)">🔤</button>
            <button onclick="setordertype(3)">📅</button>
            <button onclick="setordertype(4)">♻️</button>
        </div>
        
        </aside>

        <div id="scroll-views"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
