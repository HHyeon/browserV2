            const zoomBoxview = document.getElementById('viewbox');
            
            function updateViewbox() {
                const viewer = player;
                if (!viewer.videoWidth || !viewer.videoHeight) return;

                const rect = viewer.getBoundingClientRect();
                const vw = window.innerWidth;
                const vh = window.innerHeight;

                // intersection of image rect with viewport
                const x1 = Math.max(0, rect.left);
                const y1 = Math.max(0, rect.top);
                const x2 = Math.min(vw, rect.right);
                const y2 = Math.min(vh, rect.bottom);
                const visibleW = x2 - x1;
                const visibleH = y2 - y1;

                // map to image coordinates
                const scaleX = viewer.videoWidth / rect.width;
                const scaleY = viewer.videoHeight / rect.height;
                const leftImg = (x1 - rect.left) * scaleX;
                const topImg  = (y1 - rect.top) * scaleY;
                const wImg    = visibleW * scaleX;
                const hImg    = visibleH * scaleY;

                const zoomBox = document.getElementById('viewbox-zoom');
                zoomBox.style.left   = (leftImg / viewer.videoWidth * 100) + '%';
                zoomBox.style.top    = (topImg  / viewer.videoHeight * 100) + '%';
                zoomBox.style.width  = (wImg    / viewer.videoWidth * 100) + '%';
                zoomBox.style.height = (hImg    / viewer.videoHeight * 100) + '%';
            }
            

            function setCookie(cname, cvalue, exhours) {
                const d = new Date();
                d.setTime(d.getTime() + (exhours*60*60*1000));
                let expires = "expires="+ d.toUTCString();
                document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
            }

            function getCookie(cname) {
                let name = cname + "=";
                let ca = document.cookie.split(';');
                for(let i = 0; i < ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) == ' ') {
                        c = c.substring(1);
                    }
                    if (c.indexOf(name) == 0) {
                        return c.substring(name.length, c.length);
                    }
                }
                return "";
            }

            async function dirseek(param) {
                try {
                    const encoded = encodeURIComponent(param);
                    const res = await fetch(`dirseek.php?x=${encoded}`, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json(); // { ret: bool, data: [...] }
                } catch (e) {
                    console.error('dirseek failed', e);
                    return { ret: false, data: [] };
                }
            };

            function volumncontrol(updown)
            {
                const unit = 0.01;
                let volumnset = player.volume;
                if(updown) {
                    if(volumnset + unit > 1.0)
                        volumnset = 1.0;
                    else
                        volumnset += unit;
                }
                else {
                    if(volumnset - unit < 0)
                        volumnset = 0;
                    else
                        volumnset -= unit;
                }

                player.volume = volumnset;
                
                setLabelText(`volumn: ${parseInt(player.volume*100)}%`);
            }

            function numberpadseeking(num) {
                if(num >= 0 && num <= 9)

                    setLabelText(`(${progress}%)`);
                }
                else
                {
                    console.log("numberpadseeking - not a number");
                }
            }

            let startX = 0, startY = 0;

            function ExitZoomPanning() {

                PANNINGZOOM_VIEW_SCALE_DEFAULT = PANNINGZOOM_VIEW_SCALE = Math.min(window.innerWidth / player.videoWidth, window.innerHeight / player.videoHeight);
                PANNINGZOOM_VIEW_SCALE_PIXCELMATCH = PANNINGZOOM_VIEW_SCALE;
                zoomPanningStayed = false;
                player.style.scale = PANNINGZOOM_VIEW_SCALE;
                console.log(`initial PANNINGZOOM_VIEW_SCALE - ${PANNINGZOOM_VIEW_SCALE}`);

                currTranslateY = 0;
                player.style.transform = `translate(${currTranslateX}px, ${currTranslateY}px)`;

            }

            window.addEventListener("resize", () => {
                console.log("resized");
                ExitZoomPanning();
            });
            

            function ZoomInOut(zoom, mX, mY) {
                let exitzoom = false;

                if(zoom) {
                    PANNINGZOOM_VIEW_SCALE *= 1.1; // Zoom in

                    zoomPanningStayed = true;

                    if(PANNINGZOOM_VIEW_SCALE > PANNINGZOOM_VIEW_SCALE_PIXCELMATCH * 3) {
                        PANNINGZOOM_VIEW_SCALE = PANNINGZOOM_VIEW_SCALE_PIXCELMATCH * 3;
                    }
                }
                else  {
                    PANNINGZOOM_VIEW_SCALE /= 1.1; // Zoom out
                    if(PANNINGZOOM_VIEW_SCALE < PANNINGZOOM_VIEW_SCALE_DEFAULT) {
                        PANNINGZOOM_VIEW_SCALE = PANNINGZOOM_VIEW_SCALE_DEFAULT;
                        exitzoom = true;
                    }
                }

                if(exitzoom) {
                    ExitZoomPanning();
                    console.log(`exit zoompanning !`);
                }
                else {
                    zoomPanning_start(mX,mY);
                }

            }
            
            function zoomPanning_start(mX, mY) {
                let mousexinmgs_beforezoom = mX - player.getBoundingClientRect().left;
                let mouseyinmgs_beforezoom = mY - player.getBoundingClientRect().top;
                // console.log(`mouse in image coords: ${mousexinmgs_beforezoom}, ${mouseyinmgs_beforezoom}`);

                let mousexinmgs_realimg = (mousexinmgs_beforezoom / player.getBoundingClientRect().width) * player.videoWidth;
                let mouseyinmgs_realimg = (mouseyinmgs_beforezoom / player.getBoundingClientRect().height) * player.videoHeight;
                // console.log(`mouse in image coords after zoom: ${mousexinmgs_realimg}, ${mouseyinmgs_realimg}`);
                let mouseXfromcenter = mX - window.innerWidth/2;
                let mouseYfromcenter = mY - window.innerHeight/2;
                // console.log(`mouse from center: ${mouseXfromcenter}, ${mouseYfromcenter}`);
                
                mousexinmgs_realimg -= mouseXfromcenter / PANNINGZOOM_VIEW_SCALE;
                mouseyinmgs_realimg -= mouseYfromcenter / PANNINGZOOM_VIEW_SCALE;

                currTranslateX = player.videoWidth/2 - mousexinmgs_realimg;
                currTranslateY = player.videoHeight/2 - mouseyinmgs_realimg;
                startX = mX;
                startY = mY;

                zoomPanning_Update();
            }

                
            function zoomPanning_move(mX, mY) {
                const deltaX = (mX - startX) / PANNINGZOOM_VIEW_SCALE;
                const deltaY = (mY - startY) / PANNINGZOOM_VIEW_SCALE;
                currTranslateX += deltaX;
                currTranslateY += deltaY;

                startX = mX;
                startY = mY;
                
                zoomPanning_Update();
            }
            

            function zoomPanning_Update() {
                // console.log(`PANNINGZOOM_VIEW_SCALE - ${PANNINGZOOM_VIEW_SCALE}`);
                
                const maxTranslateX = player.videoWidth/2 - (window.innerWidth/2/PANNINGZOOM_VIEW_SCALE);
                const maxTranslateY = player.videoHeight/2 - (window.innerHeight/2/PANNINGZOOM_VIEW_SCALE);


                
                if(maxTranslateX < 0) currTranslateX = 0;
                else currTranslateX = Math.max(-maxTranslateX, Math.min(maxTranslateX, currTranslateX));
                if(maxTranslateY < 0) currTranslateY = 0;
                else currTranslateY = Math.max(-maxTranslateY, Math.min(maxTranslateY, currTranslateY));

                player.style.transform = `translate(${currTranslateX}px, ${currTranslateY}px)`;
                player.style.maxWidth = 'none';
                player.style.maxHeight = 'none';
                player.style.objectFit = 'none';
                player.style.scale = PANNINGZOOM_VIEW_SCALE;

                zoomBoxview.style.visibility = 'visible';
                updateViewbox();
            }
            

            window.addEventListener("wheel", function(e) {
                const wheelamount = e.deltaY * window.devicePixelRatio;

                if(wheelamount >= 100) {
                    ZoomInOut(false, e.clientX, e.clientY);
                    setLabelText(`zoom:  ${(PANNINGZOOM_VIEW_SCALE / PANNINGZOOM_VIEW_SCALE_PIXCELMATCH).toFixed(1)}`);
                } else if(wheelamount <= -100) {
                    ZoomInOut(true, e.clientX, e.clientY);
                    setLabelText(`zoom:  ${(PANNINGZOOM_VIEW_SCALE / PANNINGZOOM_VIEW_SCALE_PIXCELMATCH).toFixed(1)}`);
                }
                
            });

                                clearInterval(mouselongpressedcheckTimer);
                                mouseLClickShortPressed();
                            }
                        }
                        break;
                    
                    case 1: // middle

                        break;
                    
                    case 2: // right
                        {
                            rightmousedowned = false;
                            player.playbackRate = speed_currentpushstarts - speed_currentpush;

                            if(intervallyspeedinfodisplay != undefined)
                            {
                                clearInterval(intervallyspeedinfodisplay);
                                intervallyspeedinfodisplay = undefined;
                                console.log("intervallyspeedinfodisplay terminated");
                                
                                setLabelText(`playbackrate - ${player.playbackRate.toFixed(2)}`);
                            }
                        }
                        break;
                }

            });


            let seeking_progress_current_percent = 0;
            let seeking_progress_target_percent = 0;

            let seeking_labelsetting_handler = null;
            function seeking_labelsetting_handler_elapsed() {
                let msg;

                if(!player_seeking_available)
                {
                    const progress = ((startvideoposition+positionscrollcurr) / player.duration * 100).toFixed(2);
                    const sec = parseInt(positionscrollcurr);
                    msg = `seeking to ${progress}% (${sec}s)`;
                    setLabelText(msg);
                }
            }
            
            let player_seeking_available = false;
            player.addEventListener('seeked', () => {
                if(leftmousedowned) {

                    const progress = (player.currentTime / player.duration * 100).toFixed(2);
                    const sec = parseInt(player.currentTime - startvideoposition);
                    msg = `moved - ${progress}% (${sec}s)`;
                    setLabelText(msg);

                    player_seeking();
                    player_seeking_available = true;
                }
            });

            function player_seeking() {
                player.currentTime = (startvideoposition+positionscrollcurr);
            }

            const min_seeking_unit = 0.1;
            const scroll_range = 1000;

            let speed_currentpushstarts=-1;
            let speed_currentpush;

            document.addEventListener("mousemove", (param) => {
                
                if(mouselongpressedcheckTimer != null) {
                    clearTimeout(mouselongpressedcheckTimer);
                    mouselongpressedcheckTimer = null;
                }

                if(videozoompanning_dragging) {
                    zoomPanning_move(param.clientX, param.clientY);
                }

                if(leftmousedowned) {
                    // console.log("mousemove !");

                    let diff = param.x - leftmousedownpos;
                    if(diff > scroll_range) diff = scroll_range;
                    diff = parseInt(diff);
                    const maxpushduration = 300.0 // second
                    let positionscroll = parseInt(diff / scroll_range * maxpushduration);

                    positionscroll /= min_seeking_unit;
                    positionscroll = parseInt(positionscroll);
                    positionscroll *= min_seeking_unit;
                    positionscroll = parseInt(positionscroll);

                    if(leftmouse_movestarted)
                    {
                        leftmouse_movestarted = false;

                        pastpausedstate = player.paused;
                        // console.log(`pause !`);
                        player.pause();
                        positionscrollstart = positionscroll;
                        startvideoposition = player.currentTime;

                        player_seeking_available = true;
                    }

                    positionscrollcurr = positionscroll - positionscrollstart;
                    positionscrollcurr /= 10;
                    positionscrollcurr *= 10;

                    if(player_seeking_available) {
                        player_seeking();
                        player_seeking_available = false;
                    }

                }
                else if(rightmousedowned) {

                    let diff = rightmousedownpos - param.x;
                    if(diff > scroll_range) diff = scroll_range;
                    diff = parseInt(diff);
                    const maxpushamount = 1.0;
                    
                    if(rightmouse_movestarted)
                    {
                        rightmouse_movestarted = false;
                        speed_currentpushstarts = player.playbackRate;
                        
                        if(intervallyspeedinfodisplay != undefined)
                        {
                            clearInterval(intervallyspeedinfodisplay);
                            intervallyspeedinfodisplay = undefined;
                        }

                        console.log("intervallyspeedinfodisplay started");
                        intervallyspeedinfodisplay = setInterval(() => {
                            player.playbackRate = speed_currentpushstarts - speed_currentpush;
                            setLabelText(`playbackrate - ${(speed_currentpushstarts - speed_currentpush).toFixed(2)}`);
                        }, 200);
                    }

                    speed_currentpush = diff / scroll_range * maxpushamount;

                    // console.log(`push - ${speed_currentpushstarts - speed_currentpush}`);

                }

            });


            async function startup() {
                
                if(parampath != null)
                {
                    console.log(`parampath - ${parampath}`);
                    // determine if parameter is a directory or file
                    let isDir = !parampath.toLowerCase().endsWith('.mp4');
                    if(isDir)
                    {
                        currentdir = parampath;
                        if(currentdir.endsWith('/')) currentdir = currentdir.slice(0, -1);
                    }
                    else
                    {
                        currentdir = parampath.substr(0, parampath.lastIndexOf('/'));
                        currentfilename = parampath.substr(parampath.lastIndexOf('/')+1);
                    }

                    const jsondata = await dirseek(currentdir);
                    
                    if(jsondata["ret"])
                    {
                        dirlist = jsondata["data"];
                        
                        // remove hidden files
                        while(true) {  
                            const find__ = dirlist.find((a) => { return a["d"][0] == '.';});
                            if(find__ == undefined) break;
                            const idx = dirlist.lastIndexOf(find__);
                            dirlist.splice(idx, 1);
                        }

                        // keep only mp4s
                        while(true) {  
                            const find__ = dirlist.find((a) => { return a["d"].substr(a["d"].lastIndexOf('.')) != ".mp4" });
                            if(find__ == undefined) break;
                            const idx = dirlist.lastIndexOf(find__);
                            dirlist.splice(idx, 1);
                        }
                    }
                    
                    for(let i=0;i<dirlist.length;i++)
                    {
                        dirlist[i]["t"] = Date.parse(dirlist[i]["t"]);
                    }
                    
                    dirlist.sort((a,b) => { return b["t"] - a["t"]; });

                    if(paramfind != null)
                    {
                        console.log(`filtering by ${paramfind}`);   
                        dirlist = dirlist.filter(e => e["d"].toUpperCase().includes(paramfind.toUpperCase()));
                    }

                    dirlist = dirlist.filter(e => !e["d"].toLowerCase().includes('tmw'));

                    console.log(dirlist);

                    // if caller passed a directory and it's empty, abort
                    if(isDir && dirlist.length === 0) {
                        console.log('no mp4 files in directory');
                        return;
                    }

                    // if caller passed a directory, pick a random file now
                    if(isDir && dirlist.length > 0)
                    {
                        const randomitem = dirlist[Math.floor(Math.random() * dirlist.length)];
                        currentfilename = randomitem['d'];
                        parampath = currentdir + '/' + currentfilename;
                        setplaytime = true;
                        console.log(`random selected - ${currentfilename}`);
                    }

                    player = document.getElementById("player");
                    player.src = parampath;
                    player.addEventListener("playing", () => {
                        if(setplaytime)
                        {
                            setplaytime = false;
                            player.currentTime = (player.duration / 10) * (2.5+Math.random()*1.0);
                            console.log(player.currentTime);
                        }
                    });
                    player.addEventListener("loadedmetadata", () => {
                        console.log(`metadata loaded - ${player.videoWidth}x${player.videoHeight}`);
                        console.log(`win : ${window.innerWidth}x${window.innerHeight}`);
                        ExitZoomPanning();
                    });

                    video_saturate = 1.0;
                    video_brightness = 1.0;
                    video_contrast = 1.0;
                    video_filter_set();

                    player.volume = 0.2;
                    
                    setLabelText(currentfilename);

                    window.addEventListener("keydown", onKeydown);
                }
                else
                {
                    console.log(`${parampath} is null`);
                }
            }

            startup();

        </script>

    </body>
