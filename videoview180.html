<html>

	    <link rel="stylesheet" href="vr180player/vr180-player.css">

        <style>
            *{
                margin: 0px;
            }

            body {
                background-color: rgb(25, 25, 25);
                color: aliceblue;
                overflow-y: hidden; /* Hide vertical scrollbar */
                overflow-x: hidden; /* Hide horizontal scrollbar */
                text-align: center;
            }

            #label1 {
                position:fixed;
                left: 2%;
                top: 2%;
                background-color: rgba(0, 0, 0, 0.2);
            }
            
            #label2 {
                position:fixed;
                right: 2%;
                top: 2%;
                background-color: rgba(0, 0, 0, 0.2);
                visibility: hidden;
            }

            #progress-panel {
                position: fixed;
                bottom: 5vh;
                left: calc(100vw / 3);
                width: calc(100vw / 3);
                transform: translate(0, 0);
                background-color: rgba(0, 0, 0, 0.7);
                border-radius: 8px;
                padding: 12px 16px;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.3s ease, visibility 0.3s ease;
                z-index: 1000;
                box-sizing: border-box;
            }

            #progress-time {
                text-align: center;
                font-size: 1vmin;
                margin-bottom: 10px;
            }

            #progress-bar-container {
                width: 100%;
                height: 2vmin;
                background-color: rgba(255, 255, 255, 0.3);
                border-radius: 4px;
                overflow: hidden;
                cursor: pointer;
                position: relative;
            }

            #progress-bar {
                height: 100%;
                background-color: rgba(100, 180, 255, 0.9);
                border-radius: 4px;
                width: 0%;
                transition: width 0.1s linear;
                pointer-events: none;
            }

            #progress-link {
                position: absolute;
                top: 8px;
                right: 8px;
                font-size: 1.2vmin;
                color: rgba(255, 255, 255, 0.7);
                text-decoration: none;
                padding: 2px 6px;
                background-color: rgba(255, 255, 255, 0.1);
                border-radius: 3px;
                pointer-events: auto;
            }

            #progress-link:hover {
                background-color: rgba(255, 255, 255, 0.2);
            }

        </style>

            function setCookie(cname, cvalue, exhours) {
                const d = new Date();
                d.setTime(d.getTime() + (exhours*60*60*1000));
                let expires = "expires="+ d.toUTCString();
                document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
            }

            function getCookie(cname) {
                let name = cname + "=";
                let ca = document.cookie.split(';');
                for(let i = 0; i < ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) == ' ') {
                        c = c.substring(1);
                    }
                    if (c.indexOf(name) == 0) {
                        return c.substring(name.length, c.length);
                    }
                }
                return "";
            }

            async function dirseek(param) {
                try {
                    const encoded = encodeURIComponent(param);

                    return await res.json(); // { ret: bool, data: [...] }
                } catch (e) {
                    console.error('dirseek failed', e);
                    return { ret: false, data: [] };
                }
            };

                    // console.log(`push - ${speed_currentpushstarts - speed_currentpush}`);

                }
                else {
                    showProgressPanel();
                }

            });


            // --- Progress Panel ---
            const progressPanel = document.getElementById('progress-panel');
            const progressBar = document.getElementById('progress-bar');
            const progressCurrent = document.getElementById('progress-current');
            const progressTotal = document.getElementById('progress-total');
            const progressBarContainer = document.getElementById('progress-bar-container');
            const progressLink = document.getElementById('progress-link');
            progressLink.href = window.location.href;

            progressLink.addEventListener('contextmenu', (e) => {
                e.stopPropagation();
            });

            let progressHideTimer = null;
            let progressPanelDragging = false;
            let progressPanelDragStartX = 0;
            let progressPanelDragStartY = 0;
            let progressPanelTranslateX = 0;
            let progressPanelTranslateY = 0;

            function formatTime(seconds) {
                if(isNaN(seconds) || seconds < 0) return '00:00';
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = Math.floor(seconds % 60);
                if(h > 0) {
                    return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                }
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }

            function updateProgressPanel() {
                if(!player.duration) return;
                const current = player.currentTime;
                const total = player.duration;
                const percent = (current / total) * 100;

                progressBar.style.width = percent + '%';
                progressCurrent.textContent = formatTime(current);
                progressTotal.textContent = formatTime(total);
            }

            function showProgressPanel(keepVisible = false) {
                if(progressHideTimer) clearTimeout(progressHideTimer);
                progressPanel.style.opacity = '1';
                progressPanel.style.visibility = 'visible';
                if(!keepVisible) {
                    progressHideTimer = setTimeout(() => {
                        progressPanel.style.opacity = '0';
                        progressPanel.style.visibility = 'hidden';
                        progressHideTimer = null;
                    }, 500);
                } else {
                    progressHideTimer = null;
                }
            }

            function hideProgressPanel() {
                if(progressHideTimer) clearTimeout(progressHideTimer);
                progressPanel.style.opacity = '0';
                progressPanel.style.visibility = 'hidden';
                progressHideTimer = null;
            }

            progressBarContainer.addEventListener('click', (e) => {
                const rect = progressBarContainer.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const percent = clickX / rect.width;
                if(player.duration) {
                    player.currentTime = player.duration * percent;
                    updateProgressPanel();
                    showProgressPanel();
                }
            });

            progressBarContainer.addEventListener('mousedown', (e) => {
                e.stopPropagation();
            });

            progressPanel.addEventListener('mousedown', (e) => {
                if (e.target.id === 'progress-bar-container' ||
                    e.target.id === 'progress-bar') {
                    return;
                }
                e.preventDefault();
                e.stopPropagation();
                progressPanelDragging = true;
                progressPanelDragStartX = e.clientX - progressPanelTranslateX;
                progressPanelDragStartY = e.clientY - progressPanelTranslateY;
                progressPanel.style.cursor = 'move';
                showProgressPanel(true);
            });

            document.addEventListener('mousemove', (e) => {
                if(progressPanelDragging) {
                    const newX = e.clientX - progressPanelDragStartX;
                    const newY = e.clientY - progressPanelDragStartY;
                    progressPanelTranslateX = newX;
                    progressPanelTranslateY = newY;
                    progressPanel.style.transform = `translate(${newX}px, ${newY}px)`;
                    showProgressPanel(true);
                }
            });

            document.addEventListener('mouseup', (e) => {
                if(progressPanelDragging) {
                    progressPanelDragging = false;
                    progressPanel.style.cursor = '';
                }
            });

                    dirlist.sort((a,b) => { return b["t"] - a["t"]; });

                    {
                        console.log(`filtering by ${paramfind}`);   
                        
                        dirlist = dirlist.filter(e => e["d"].toUpperCase().includes(paramfind.toUpperCase()));

                    dirlist = dirlist.filter(e => e["d"].toLowerCase().includes('tmw'));

                    // player.addEventListener("playing", () => {
                    //     if(setplaytime)
                    //     {
                    //         setplaytime = false;
                    //         player.currentTime = (player.duration / 10) * (1+Math.random()*3.0);
                    //         console.log(player.currentTime);
                    //     }
                    // });

                    video_saturate = 1.0;
                    video_brightness = 1.0;
                    video_contrast = 1.0;
                    video_filter_set();

                    player.volume = 0.5;
                    
                    setLabelText(currentfilename);
                    player.title = currentfilename;

                    // var promise = player.play();

                    // if(promise != undefined) {
                    //     promise.then(_ => {
                    //         console.log("promise returned Successed");
                    //     }).catch(error => {
                    //         console.log("promise returned failed");
                    //     });
                    // }

                    window.addEventListener("keydown", onKeydown);
                }
                else
                {
                    console.log(`${parampath} is null`);
                }
            }

            startup();

        </script>
