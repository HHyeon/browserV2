<html>
<head>
    <meta charset="utf-8">
    <title>imageviewer</title>
    <style>
        body {
            margin:0;
            background-color:#000;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
            overflow:hidden;
        }
        img {
            max-width:100%;
            max-height:100%;
            object-fit:contain;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: small;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body draggable="false">
    <img id="viewer" src="" alt="" style="cursor:pointer;" draggable="false" />
    <div id="info"></div>

    <script>
        async function dirseek(param) {
            try {
                const res = await fetch(`dirseek.php?x=${param}`, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (e) {
                console.error('dirseek failed', e);
                return { ret: false, data: [] };
            }
        }

        function isImage(name) {
            const ext = name.substring(name.lastIndexOf('.')+1).toLowerCase();
            return ['jpg','jpeg','png','gif','bmp','webp'].includes(ext);
        }

        document.addEventListener('wheel', e => {
            e.preventDefault();
            if(e.deltaY > 0) {
                nextImage(); // scroll down -> next
            } else {
                showImage(idx-1); // scroll up -> previous
            }
        }, { passive: false });

        const urlParams = (new URL(window.location.href)).searchParams;
        let parampath = urlParams.get('p');
        if(parampath && parampath.endsWith('/')) parampath = parampath.slice(0,-1);
        if(!parampath) parampath = '.';
        document.title = parampath.substring(parampath.lastIndexOf('/')+1);

        let images = [];
        let idx = 0;

        async function startup() {
            const json = await dirseek(parampath);
            if(json.ret) {
                images = json.data.map(d=>d.d).filter(isImage).sort((a,b)=>a.localeCompare(b));
                if(images.length>0) {
                    showImage(0);
                } else {
                    console.log('no images');
                }
            }
        }

        function showImage(i) {
            idx = (i + images.length) % images.length;
            const img = document.getElementById('viewer');
            img.src = parampath + '/' + encodeURI(images[idx]);

            if(img.complete) {
                onImageLoaded();
            } else {
                img.onload = onImageLoaded;
            }

            document.title = images[idx];
            // 정보 표시 업데이트
            const info = document.getElementById('info');
            info.textContent = `${idx + 1}/${images.length} ${images[idx]}`;
        }

        function nextImage() {
            if(images.length>0) {
                showImage(idx+1);
            }
        }

        let zoomActive = false;
        let startX = 0, startY = 0;
        let currTranslateX = 0, currTranslateY = 0;
        const viewerElem = document.getElementById('viewer');

        function onImageLoaded() {
            console.log(`image : ${viewerElem.naturalWidth}, ${viewerElem.naturalHeight}` + 
                         ` window: ${window.innerWidth}, ${window.innerHeight}` + 
                         ` viewport: ${viewerElem.clientWidth}, ${viewerElem.clientHeight}`
                        );
        }

        // disable context menu so right-click can navigate
        viewerElem.addEventListener('contextmenu', e => {
            e.preventDefault();
        });
        // prevent built-in drag behavior on the image
        viewerElem.addEventListener('dragstart', e => {
            e.preventDefault();
        });
        // also block context menu on whole document to be safe
        document.addEventListener('contextmenu', e => {
            e.preventDefault();
        });

        let zoom_moveing_scale = 3.0;
        let zoom_view_scale = 1.0;

        document.addEventListener('mousedown', e => {
            e.stopPropagation();
            console.log('mouse down', e.clientX, e.clientY);
            if(e.button == 1) {
                // middle button: toggle fullscreen
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            }
            else if(e.button === 2) {
                // right button: next if right half, prev if left half
                const centerX = window.innerWidth / 2;
                if(e.clientX > centerX) {
                    nextImage(); // right side -> next
                } else {
                    showImage(idx-1); // left side -> previous
                }
            }
            else if(e.button === 0) {
                // left button: start zoom/pan

                let mousexinmgs_beforezoom = e.clientX - viewerElem.getBoundingClientRect().left;
                let mouseyinmgs_beforezoom = e.clientY - viewerElem.getBoundingClientRect().top;
                console.log(`mouse in image coords: ${mousexinmgs_beforezoom}, ${mouseyinmgs_beforezoom}`);

                let mousexinmgs_realimg = (mousexinmgs_beforezoom / viewerElem.clientWidth) * viewerElem.naturalWidth;
                let mouseyinmgs_realimg = (mouseyinmgs_beforezoom / viewerElem.clientHeight) * viewerElem.naturalHeight;
                console.log(`mouse in image coords after zoom: ${mousexinmgs_realimg}, ${mouseyinmgs_realimg}`);

                let mouseXfromcenter = e.clientX - window.innerWidth/2;
                let mouseYfromcenter = e.clientY - window.innerHeight/2;
                console.log(`mouse from center: ${mouseXfromcenter}, ${mouseYfromcenter}`);

                mousexinmgs_realimg -= mouseXfromcenter / zoom_view_scale;
                mouseyinmgs_realimg -= mouseYfromcenter / zoom_view_scale;

                zoomActive = true;
                startX = e.clientX;
                startY = e.clientY;
                currTranslateX = viewerElem.naturalWidth/2 - mousexinmgs_realimg;
                currTranslateY = viewerElem.naturalHeight/2 - mouseyinmgs_realimg;

                // currTranslateX += mouseXfromcenter
                // currTranslateY += mouseYfromcenter;

                viewerElem.style.transform = `translate(${currTranslateX}px, ${currTranslateY}px)`;
                viewerElem.style.maxWidth = 'none';
                viewerElem.style.maxHeight = 'none';
                viewerElem.style.objectFit = 'initial';
                viewerElem.style.scale = zoom_view_scale;
                document.body.style.cursor = 'move';
            }
        });

        document.addEventListener('mousemove', e => {
            if(zoomActive) {
                const deltaX = (e.clientX - startX) * zoom_moveing_scale;
                const deltaY = (e.clientY - startY) * zoom_moveing_scale;
                currTranslateX -= deltaX;
                currTranslateY -= deltaY;
                viewerElem.style.transform = `translate(${currTranslateX}px, ${currTranslateY}px)`;
                viewerElem.style.scale = zoom_view_scale;
                startX = e.clientX;
                startY = e.clientY;
            }
        });


        document.addEventListener('mouseup', e => {
            if(zoomActive && e.button === 0) {
                // reset
                viewerElem.style.maxWidth = '';
                viewerElem.style.maxHeight = '';
                viewerElem.style.objectFit = 'contain';
                viewerElem.style.transform = '';
                viewerElem.style.scale = '';
                zoomActive = false;
                document.body.style.cursor = '';
            }
        });

        document.addEventListener('keydown', e=>{
            if(e.key=='ArrowRight' || e.key==' ' ) nextImage();
            else if(e.key=='ArrowLeft') showImage(idx-1);
            else if(e.key=='Enter') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            }
            else if(/^[0-9]$/.test(e.key)) {
                if(images.length>0) {
                    let step = parseInt(e.key);
                    let target;
                    if(step === 0) {
                        target = 0; // first image
                    } else {
                        target = Math.floor(images.length * (step/10));
                        if(target >= images.length) target = images.length -1;
                    }
                    showImage(target);
                }
            }
        });

        startup();
    </script>
</body>
</html>
