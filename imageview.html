<html>
<head>
    <meta charset="utf-8">
    <title>imageviewer</title>
    <style>
        body {
            margin:0;
            background-color:#000;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
            overflow:hidden;
        }
        img {
            max-width:none;
            max-height:none;
            object-fit:none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: small;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 3px;
        }

        #viewbox {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 120px;
            height: 120px;
            border: 1px solid rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.05);
            box-sizing: border-box;
            pointer-events: none; /* overlay should not block mouse events */
            z-index: 1000;
        }
        #viewbox-zoom {
            position: absolute;
            border: 1px solid rgba(255,0,0,0.8);
            background: rgba(255,0,0,0.2);
            box-sizing: border-box;
        }
        
        #progress-panel {
            position: fixed;
            bottom: 5vh;
            left: calc(100vw / 3);
            width: calc(100vw / 3);
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            padding: 12px 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 1000;
            box-sizing: border-box;
        }

        #progress-time {
            text-align: center;
            font-size: 1vmin;
            margin-bottom: 10px;
        }

        #progress-bar-container {
            width: 100%;
            height: 2vmin;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        #progress-bar {
            height: 100%;
            background-color: rgba(100, 180, 255, 0.9);
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s linear;
            pointer-events: none;
        }
        
    </style>
</head>
<body draggable="false">
    <img id="viewer" src="" alt="" draggable="false" decoding="async" fetchpriority="high"/>
    <div id="info"></div>

    <div id="viewbox" style="visibility:hidden;">
        <div id="viewbox-zoom"></div>
    </div>

    <div id="progress-panel">
        <div id="progress-time">
            <span id="progress-current">1</span>
            <span id="progress-separator"> / </span>
            <span id="progress-total">1</span>
        </div>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script>

        let PANNINGZOOM_VIEW_SCALE_PIXCELMATCH = 0;
        let PANNINGZOOM_VIEW_SCALE_DEFAULT = 0;
        let PANNINGZOOM_VIEW_SCALE = PANNINGZOOM_VIEW_SCALE_DEFAULT;
        const RIGHT_DRAG_THRESHOLD = window.innerWidth/10; // 10 slots per screen width


        async function dirseek(param) {
            try {
                const res = await fetch(`dirseek.php?x=${param}`, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (e) {
                console.error('dirseek failed', e);
                return { ret: false, data: [] };
            }
        }

        function isImage(name) {
            const ext = name.substring(name.lastIndexOf('.')+1).toLowerCase();
            return ['jpg','jpeg','png','gif','bmp','webp'].includes(ext);
        }

        const zoomBoxview = document.getElementById('viewbox');
        
        function updateViewbox() {
            const viewer = viewerElem;
            if (!viewer.naturalWidth || !viewer.naturalHeight) return;

            const rect = viewer.getBoundingClientRect();
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            // intersection of image rect with viewport
            const x1 = Math.max(0, rect.left);
            const y1 = Math.max(0, rect.top);
            const x2 = Math.min(vw, rect.right);
            const y2 = Math.min(vh, rect.bottom);
            const visibleW = x2 - x1;
            const visibleH = y2 - y1;

            // map to image coordinates
            const scaleX = viewer.naturalWidth / rect.width;
            const scaleY = viewer.naturalHeight / rect.height;
            const leftImg = (x1 - rect.left) * scaleX;
            const topImg  = (y1 - rect.top) * scaleY;
            const wImg    = visibleW * scaleX;
            const hImg    = visibleH * scaleY;

            const zoomBox = document.getElementById('viewbox-zoom');
            zoomBox.style.left   = (leftImg / viewer.naturalWidth * 100) + '%';
            zoomBox.style.top    = (topImg  / viewer.naturalHeight * 100) + '%';
            zoomBox.style.width  = (wImg    / viewer.naturalWidth * 100) + '%';
            zoomBox.style.height = (hImg    / viewer.naturalHeight * 100) + '%';
        }

        function ZoomInOut(zoom, mX, mY) {
            let exitzoom = false;

            if(zoom) {
                PANNINGZOOM_VIEW_SCALE *= 1.1; // Zoom in

                zoomPanningStayed = true;

                if(PANNINGZOOM_VIEW_SCALE > PANNINGZOOM_VIEW_SCALE_PIXCELMATCH * 1.5) {
                    PANNINGZOOM_VIEW_SCALE = PANNINGZOOM_VIEW_SCALE_PIXCELMATCH * 1.5;
                }
            }
            else  {
                PANNINGZOOM_VIEW_SCALE /= 1.1; // Zoom out
                if(PANNINGZOOM_VIEW_SCALE < PANNINGZOOM_VIEW_SCALE_DEFAULT) {
                    PANNINGZOOM_VIEW_SCALE = PANNINGZOOM_VIEW_SCALE_DEFAULT;
                    exitzoom = true;
                }
            }

            if(exitzoom) {
                ExitZoomPanning();
                console.log(`exit zoompanning !`);
            }
            else {
                // zoomPanning_Update();

                zoomPanning_start(mX,mY);
            }

        }

        document.addEventListener('wheel', e => {
            e.preventDefault();

            const wheelamount = e.deltaY * window.devicePixelRatio;

            // console.log(`wheelamount - ${wheelamount}`);
            
            if(wheelamount >= 100) {
                ZoomInOut(false, e.clientX, e.clientY);
            } else if(wheelamount <= -100) {
                ZoomInOut(true, e.clientX, e.clientY);
            }

        }, { passive: false });

        const urlParams = (new URL(window.location.href)).searchParams;
        let parampath = urlParams.get('p');
        if(parampath && parampath.endsWith('/')) parampath = parampath.slice(0,-1);
        if(!parampath) parampath = '.';
        document.title = parampath.substring(parampath.lastIndexOf('/')+1);

        let images = [];
        let idx = 0;

        async function prepareimageDir(imgdir, random=false) {
            currentimageDirListname = imgdir;
            console.log(`preparing dir ${imgdir}`);

            images = [];
            idx = 0;

            const json = await dirseek(imgdir);
            if(json.ret) {
                images = json.data.map(d=>d.d).filter(isImage).sort((a,b)=>a.localeCompare(b));
                if(images.length>0) {
                    console.log(`showing imgs ${images.length}`);
                    if(random)
                        idx = Math.round(Math.random()*images.length);
                    showImage(idx);
                } else {
                    console.log('no images');
                }
            }
            else {
                console.log(`${imgdir} invalid !!`);
            }
        }

        let imagesDirList = [];
        let imagesDirList_jumpidx=0;
        let currentimageDirListname;

        async function startup() {
            prepareimageDir(parampath);

            const upperdirpath = parampath.substring(0, parampath.lastIndexOf('/'));
            const jsondata = await dirseek(upperdirpath);

            if(jsondata["ret"]) {
                let dirlist = jsondata["data"];
                
                // remove hidden files
                while(true) {  
                    const find__ = dirlist.find((a) => { return a["d"][0] == '.';});
                    if(find__ == undefined) break;
                    const idx = dirlist.lastIndexOf(find__);
                    dirlist.splice(idx, 1);
                }

                // console.log(dirlist);

                for (const each of dirlist) {
                    const belowdirjsondata = await dirseek(`${upperdirpath}/${each.d}`);

                    if(belowdirjsondata.ret) {
                        let imageCount = 0;
                
                        for (const below_each of belowdirjsondata["data"]) {
                            const name = below_each["d"];
                            
                            if(isImage(name)) {
                                imageCount++;
                            }
                        }
                
                        const totalFiles = jsondata["data"].length;
                        const imageRatio = totalFiles > 0 ? imageCount / totalFiles : 0;
                        const hasHighImageRatio = imageRatio >= 0.9;

                        if(hasHighImageRatio) 
                            imagesDirList.push(each.d);
                        // else
                        // {
                        //     console.log(`${each.d} is not img dirs`);
                        // }
                    }
                }

            }

        }

        function showImage(i) {

            if(zoomPanningStayed) {
                ExitZoomPanning();
            }
            zoomPanningStayed = false;
            isRightDragging = false;

            idx = (i + images.length) % images.length;
            const img = document.getElementById('viewer');
            img.src = currentimageDirListname + '/' + encodeURI(images[idx]);

            if(img.complete) {
                onImageLoaded();
            } else {
                img.onload = () => {
                    onImageLoaded();
                };
            }

            document.title = images[idx];
            const info = document.getElementById('info');
            info.textContent = `${idx + 1}/${images.length} ${images[idx]}`;
            updateProgressPanel();
        }

        function nextImage() {
            if(images.length>0) {
                showImage(idx+1);
            }
        }

        let MouseL_Dragging = false;
        let startX = 0, startY = 0;
        let currTranslateX = 0, currTranslateY = 0;
        const viewerElem = document.getElementById('viewer');

        let zoom_moveing_scale_x = 1;
        let zoom_moveing_scale_y = 1;

        let progressHideTimer = null;
        const progressPanel = document.getElementById('progress-panel');
        const progressBar = document.getElementById('progress-bar');
        const progressCurrent = document.getElementById('progress-current');
        const progressTotal = document.getElementById('progress-total');
        const progressBarContainer = document.getElementById('progress-bar-container');

        function updateProgressPanel() {
            if(images.length === 0) return;
            const current = idx + 1;
            const total = images.length;
            const percent = (current / total) * 100;
            
            progressBar.style.width = percent + '%';
            progressCurrent.textContent = current;
            progressTotal.textContent = total;
        }

        function showProgressPanel(keepVisible = false) {
            if(progressHideTimer) clearTimeout(progressHideTimer);
            progressPanel.style.opacity = '1';
            progressPanel.style.visibility = 'visible';
            if(!keepVisible) {
                progressHideTimer = setTimeout(() => {
                    progressPanel.style.opacity = '0';
                    progressPanel.style.visibility = 'hidden';
                    progressHideTimer = null;
                }, 500);
            } else {
                progressHideTimer = null;
            }
        }

        function hideProgressPanel() {
            if(progressHideTimer) clearTimeout(progressHideTimer);
            progressPanel.style.opacity = '0';
            progressPanel.style.visibility = 'hidden';
            progressHideTimer = null;
        }

        progressBarContainer.addEventListener('click', (e) => {
            const rect = progressBarContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = clickX / rect.width;
            const targetIdx = Math.floor(images.length * percent);
            showImage(targetIdx);
        });

        progressBarContainer.addEventListener('mousedown', (e) => {
            e.stopPropagation();
        });

        function onImageLoaded() {
            console.log(`image : ${viewerElem.naturalWidth}, ${viewerElem.naturalHeight}` + 
                         ` window: ${window.innerWidth}, ${window.innerHeight}`);

            zoom_moveing_scale_x = viewerElem.naturalWidth / window.innerWidth;
            zoom_moveing_scale_y = viewerElem.naturalHeight / window.innerHeight;

            PANNINGZOOM_VIEW_SCALE_PIXCELMATCH = 1 / window.devicePixelRatio;
            PANNINGZOOM_VIEW_SCALE_DEFAULT = Math.min(window.innerWidth/viewerElem.naturalWidth, window.innerHeight/viewerElem.naturalHeight);

            ExitZoomPanning();

            console.log(`default viewscale ${PANNINGZOOM_VIEW_SCALE}`);
            console.log(`moveing scale: ${zoom_moveing_scale_x}, ${zoom_moveing_scale_y}`);

            updateViewbox();

            zoomBoxview.style.visibility = 'hidden';
        }

        // disable context menu so right-click can navigate
        viewerElem.addEventListener('contextmenu', e => {
            e.preventDefault();
        });
        // prevent built-in drag behavior on the image
        viewerElem.addEventListener('dragstart', e => {
            e.preventDefault();
        });
        // also block context menu on whole document to be safe
        document.addEventListener('contextmenu', e => {
            e.preventDefault();
        });

        // Update overlay on window resize
        window.addEventListener('resize', () => {
            onImageLoaded();
        });

        let rightDragStartX = 0;
        let isRightDragging = false;

        let zoomPanningStayed = false;
        let mouselongpressedcheckTimer = null;

        function mouseLClickLongPressed() {
            mouselongpressedcheckTimer = null;
        }

        function mouseLClickShortPressed() {
            // console.log("short pressed !");

            zoomPanningStayed = !zoomPanningStayed;

            if(zoomPanningStayed) {
                console.log(`zoomPanningStayed started`);
            }
            else {
                console.log(`zoomPanningStayed exit`);
                ExitZoomPanning();
            }

        }



        function zoomPanning_Update() {
            // console.log(`PANNINGZOOM_VIEW_SCALE - ${PANNINGZOOM_VIEW_SCALE}`);
            
            const maxTranslateX = viewerElem.naturalWidth/2 - (window.innerWidth/2/PANNINGZOOM_VIEW_SCALE);
            const maxTranslateY = viewerElem.naturalHeight/2 - (window.innerHeight/2/PANNINGZOOM_VIEW_SCALE);
            
            if(maxTranslateX < 0) currTranslateX = 0;
            else currTranslateX = Math.max(-maxTranslateX, Math.min(maxTranslateX, currTranslateX));
            if(maxTranslateY < 0) currTranslateY = 0;
            else currTranslateY = Math.max(-maxTranslateY, Math.min(maxTranslateY, currTranslateY));

            viewerElem.style.transform = `translate(${currTranslateX}px, ${currTranslateY}px)`;
            viewerElem.style.maxWidth = 'none';
            viewerElem.style.maxHeight = 'none';
            viewerElem.style.objectFit = 'none';
            viewerElem.style.scale = PANNINGZOOM_VIEW_SCALE;

            zoomBoxview.style.visibility = 'visible';
            updateViewbox();
        }

        function zoomPanning_start(mX, mY) {
            const mousexinmgs_beforezoom = mX - viewerElem.getBoundingClientRect().left;
            const mouseyinmgs_beforezoom = mY - viewerElem.getBoundingClientRect().top;

            let mousexinmgs_realimg = (mousexinmgs_beforezoom / viewerElem.getBoundingClientRect().width) * viewerElem.naturalWidth;
            let mouseyinmgs_realimg = (mouseyinmgs_beforezoom / viewerElem.getBoundingClientRect().height) * viewerElem.naturalHeight;
            const mouseXfromcenter = mX - window.innerWidth/2;
            const mouseYfromcenter = mY - window.innerHeight/2;
            
            mousexinmgs_realimg -= mouseXfromcenter / PANNINGZOOM_VIEW_SCALE;
            mouseyinmgs_realimg -= mouseYfromcenter / PANNINGZOOM_VIEW_SCALE;

            currTranslateX = viewerElem.naturalWidth/2 - mousexinmgs_realimg;
            currTranslateY = viewerElem.naturalHeight/2 - mouseyinmgs_realimg;
            startX = mX;
            startY = mY;

            zoomPanning_Update();
        }

        function zoomPanning_move(mX, mY) {
            if(zoomPanningStayed) {
                const deltaX = (mX - startX) / PANNINGZOOM_VIEW_SCALE;
                const deltaY = (mY - startY) / PANNINGZOOM_VIEW_SCALE;
                currTranslateX += deltaX;
                currTranslateY += deltaY;
            }
            else {
                const deltaX = (mX - startX) * zoom_moveing_scale_x;
                const deltaY = (mY - startY) * zoom_moveing_scale_y;
                currTranslateX -= deltaX;
                currTranslateY -= deltaY;
            }
            startX = mX;
            startY = mY;
            
            zoomPanning_Update();
        }
                    

        document.addEventListener('mousedown', e => {
            if(e.button == 1) {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            }
            else if(e.button === 2) {
                rightDragStartX = e.clientX;
                isRightDragging = true;
            }
            else if(e.button === 0) {
                mouselongpressedcheckTimer = setTimeout(mouseLClickLongPressed, 200);
                
                MouseL_Dragging = true;

                if(zoomPanningStayed) {
                    startX = e.clientX;
                    startY = e.clientY;
                }
                else
                {
                    PANNINGZOOM_VIEW_SCALE = PANNINGZOOM_VIEW_SCALE_PIXCELMATCH;
                    console.log(`1:1 scale: ${PANNINGZOOM_VIEW_SCALE}`);
                    zoomPanning_start(e.clientX, e.clientY);
                    viewerElem.style.cursor = 'none';
                }

            }
        });

        document.addEventListener('mousemove', e => {

            if(MouseL_Dragging) {
                
                if(mouselongpressedcheckTimer != null) {
                    clearTimeout(mouselongpressedcheckTimer);
                    mouselongpressedcheckTimer = null;
                }
                
                zoomPanning_move(e.clientX, e.clientY);
            }
            
            if(isRightDragging) {
                const deltaX = e.clientX - rightDragStartX;
                const absDelta = Math.abs(deltaX);
                if(absDelta >= RIGHT_DRAG_THRESHOLD) {
                    const steps = Math.floor(absDelta / RIGHT_DRAG_THRESHOLD);
                    const dir = deltaX > 0 ? 1 : -1;
                    for(let i = 0; i < steps; i++) {
                        if(dir > 0) {
                            nextImage();
                        } else {
                            showImage(idx-1);
                        }
                    }
                    rightDragStartX = e.clientX;
                }
            }
            else {
                showProgressPanel();
            }
            
        });

        function ExitZoomPanning() {
            zoomPanningStayed = false;
            PANNINGZOOM_VIEW_SCALE = PANNINGZOOM_VIEW_SCALE_DEFAULT;

            currTranslateX = currTranslateY = 0;
            // reset
            viewerElem.style.maxWidth = '';
            viewerElem.style.maxHeight = '';
            viewerElem.style.transform = `translate(${currTranslateX}px, ${currTranslateY}px)`;
            viewerElem.style.transform = '';
            viewerElem.style.scale = PANNINGZOOM_VIEW_SCALE;
            MouseL_Dragging = false;

            viewerElem.style.cursor = '';
        
            zoomBoxview.style.visibility = 'hidden';
        }

        document.addEventListener('mouseup', e => {


            if(e.button === 0) {

                if(mouselongpressedcheckTimer != null) { // cancel longpressed timeout 
                    clearTimeout(mouselongpressedcheckTimer);
                    mouseLClickShortPressed();
                }

                if(zoomPanningStayed) {
                    MouseL_Dragging = false;

                    viewerElem.style.cursor = '';
                }
                else
                {
                    if(MouseL_Dragging) {
                        ExitZoomPanning();
                    }
                }
            }
            


                
            // --- finalize right‑button drag or click ---
            if(e.button === 2) {
                if(isRightDragging) {
                    const deltaX = e.clientX - rightDragStartX;
                    const absDelta = Math.abs(deltaX);
                    const clickBorder = window.innerWidth / 3;
                    
                    if(absDelta < RIGHT_DRAG_THRESHOLD) {
                        if(e.clientX > clickBorder) {
                            nextImage();
                        } else if(e.clientX < clickBorder) {
                            showImage(idx-1);
                        }
                    }
                    isRightDragging = false;
                }
            }
            
        });

        

        function imgDirListJump(type) {

            const currentimgDirname = currentimageDirListname.substring(currentimageDirListname.lastIndexOf('/')+1);
            let nextimgDirname = null;
            let randomimg = false;

            while(true) {

                if(type == 0) //next 
                {
                    imagesDirList_jumpidx++;
                    if(imagesDirList_jumpidx >= imagesDirList.length) imagesDirList_jumpidx = 0;
                }
                else if(type == 1) // prev
                {
                    if(imagesDirList_jumpidx > 0) {
                        imagesDirList_jumpidx --;
                    }
                    else {
                        imagesDirList_jumpidx = imagesDirList.length - 1;
                    }
                }
                else
                {
                    imagesDirList_jumpidx = (Math.round(Math.random()*1000))%imagesDirList.length;
                    randomimg = true;
                }

                if(imagesDirList[imagesDirList_jumpidx] != currentimgDirname) {
                    nextimgDirname = imagesDirList[imagesDirList_jumpidx];
                    break;
                }
            }

            prepareimageDir(`${currentimageDirListname.substring(0, currentimageDirListname.lastIndexOf('/'))}/${nextimgDirname}`, randomimg);
            
        }
        

        document.addEventListener('keydown', e=>{
            if(e.key=='ArrowRight' || e.key==' ' ) nextImage();
            else if(e.key=='ArrowLeft') showImage(idx-1);
            else if(e.key=='Enter') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            }
            else if(e.key == ']') 
            {
                imgDirListJump(0);
            }
            else if(e.key == '[') 
            {
                imgDirListJump(1);
            }
            else if(e.key == '\\') 
            {
                imgDirListJump(2);
            }
            else if(/^[0-9]$/.test(e.key)) {
                if(images.length>0) {
                    let step = parseInt(e.key);
                    let target;
                    if(step === 0) {
                        target = 0; // first image
                    } else {
                        target = Math.floor(images.length * (step/10));
                        if(target >= images.length) target = images.length -1;
                    }
                    showImage(target);
                }
            }
        });

        startup();
    </script>
</body>
</html>
